<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Order Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:15px;
max-width:1000px;
margin:auto;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
overflow-x:auto;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
font-size:16px;
}

button{
background:#0066ff;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
min-width:800px;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#0066ff;
color:white;
}

tr:nth-child(even){
background:#f7f7f7;
}

.searchBox{
display:flex;
gap:10px;
margin-top:10px;
}

.searchBox input{flex:1;}
.searchBox button{width:130px;}
</style>
</head>

<body>

<div class="container">

<h2>Order Management System</h2>

<label>Order Date</label>
<input id="orderDate" type="date">

<label>Delivery Date</label>
<input id="deliveryDate" type="date">

<input id="description" placeholder="Description">

<input id="customer" type="tel" inputmode="numeric"
placeholder="Customer Number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input id="amount" type="number" placeholder="Amount">

<select id="payment">
<option>Paid Online</option>
<option>Cash</option>
<option>Downpayment</option>
<option>Unpaid</option>
</select>

<button id="saveBtn" onclick="save()">Save Order</button>

<div id="status"></div>

<hr>

<h3>Search Customer Number</h3>

<div class="searchBox">
<input id="searchCustomer" type="tel"
placeholder="Enter Customer Number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<button onclick="search()">Search</button>
</div>

<div id="result"></div>

<hr>

<h3>Order List</h3>

<table>
<thead>
<tr>
<th>Order No.</th>
<th>Order Date</th>
<th>Delivery Date</th>
<th>Description</th>
<th>Customer No.</th>
<th>Amount</th>
<th>Payment</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbxScIAIu1hKFd42-LL95bLErkG-iWWiBCi_KFwLhr9_7DEE1_rYbZkpVplYvnFdQvdx/exec";

function formatDate(value){
if(!value) return "";
const d = new Date(value);
if(isNaN(d.getTime())) return value;
return d.toLocaleDateString('en-GB');
}

function save(){

let btn=document.getElementById("saveBtn");
let status=document.getElementById("status");

btn.disabled=true;
btn.innerHTML="Saving...";

let data={
orderDate:document.getElementById("orderDate").value,
deliveryDate:document.getElementById("deliveryDate").value,
description:document.getElementById("description").value,
customer:document.getElementById("customer").value,
amount:document.getElementById("amount").value,
payment:document.getElementById("payment").value
};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.text())
.then(()=>{

status.innerHTML="Order Saved ✓";

document.getElementById("orderDate").value="";
document.getElementById("deliveryDate").value="";
document.getElementById("description").value="";
document.getElementById("customer").value="";
document.getElementById("amount").value="";
document.getElementById("payment").selectedIndex=0;

loadData();

setTimeout(()=>{
btn.disabled=false;
btn.innerHTML="Save Order";
status.innerHTML="";
},2000);

})
.catch(()=>{
status.innerHTML="Error Saving";
btn.disabled=false;
btn.innerHTML="Save Order";
});
}

function search(){

let customerNo=document.getElementById("searchCustomer").value;

if(!customerNo){
alert("Enter Customer Number");
return;
}

fetch(API+"?customer="+customerNo)
.then(r=>r.json())
.then(data=>{

if(!data.order){
document.getElementById("result").innerHTML="No record found";
return;
}

document.getElementById("result").innerHTML=`
<br><b>Search Result</b><br><br>
Order Number: ${data.order}<br><br>
Order Date: ${formatDate(data.orderDate)}<br><br>
Delivery Date: ${formatDate(data.deliveryDate)}<br><br>
Description: ${data.description}<br><br>
Customer Number: ${data.customer}<br><br>
Amount: ${data.amount}<br><br>
Payment: ${data.payment}
`;

});
}

function loadData(){

fetch(API)
.then(r=>r.json())
.then(data=>{

let html="";

for(let i=1;i<data.length;i++){

html+=`
<tr>
<td>${data[i][0]||""}</td>
<td>${formatDate(data[i][1])}</td>
<td>${formatDate(data[i][2])}</td>
<td>${data[i][3]||""}</td>
<td>${data[i][4]||""}</td>
<td>${data[i][5]||""}</td>
<td>${data[i][6]||""}</td>
</tr>
`;
}

document.getElementById("tbody").innerHTML=html;

});
}

loadData();

</script>

</body>
</html>
